;==========================================================
; Polybar Configuration
;==========================================================

[colors]
; Nord color palette
nord0 = #2e3440
nord1 = #3b4252
nord2 = #434c5e
nord3 = #4c566a
nord4 = #d8dee9
nord5 = #e5e9f0
nord6 = #eceff4
nord7 = #8fbcbb
nord8 = #88c0d0
nord9 = #81a1c1
nord10 = #5e81ac
nord11 = #bf616a
nord12 = #d08770
nord13 = #ebcb8b
nord14 = #a3be8c
nord15 = #b48ead

; Bar colors
background = ${colors.nord0}
foreground = ${colors.nord4}
primary = ${colors.nord8}
secondary = ${colors.nord9}
alert = ${colors.nord11}

;==========================================================
; Bar Main Configuration
;==========================================================
[bar/main]
; Monitor
monitor = ${env:MONITOR:}

; Size and position
width = 100%
height = 26
offset-x = 0
offset-y = 0
bottom = false
override-redirect = true
wm-restack = generic

; Colors
background = ${colors.background}
foreground = ${colors.foreground}

; Border
border-size = 0

; Padding
padding-left = 0
padding-right = 1
module-margin-left = 1
module-margin-right = 1

; Fonts
font-0 = "JetBrains Mono Nerd Font:size=10;2"
font-1 = "JetBrains Mono Nerd Font:size=12;2"

; Modules layout
modules-left = dwm-tags window
modules-center = date
modules-right = network-custom cpu memory volume battery tray

; Disable tray
; tray-position = none

; No separator between modules
separator = ""
separator-foreground = ${colors.nord3}
separator-padding = 0

; Cursor settings
cursor-click = pointer
cursor-scroll = ns-resize

;==========================================================
; Custom DWM Workspace Module
;==========================================================
[module/dwm-tags]
type = internal/xworkspaces

group-by-monitor = false
enable-click = false
enable-scroll = true
reverse-scroll = false

format = <label-state>

label-active = %name%
label-active-foreground = #88c0d0
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-foreground = #bf616a
label-urgent-padding = 1

label-empty =
label-empty-padding = 0

;==========================================================
; Custom Network Module
;==========================================================
[module/network-custom]
type = custom/script
exec = ~/.config/polybar/scripts/network-status.sh
tail = true
click-left = ~/.config/polybar/scripts/wifi-menu.sh

;==========================================================
; Workspace Name
;==========================================================
[module/window]
type = internal/xwindow
label = %title%
label-foreground = ${colors.nord8}
format = <label>
format-maxlen = 60
label-maxlen = 60

;==========================================================
; Battery Module
;==========================================================
[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD
full-at = 99
poll-interval = 5

; Charging format
format-charging = <animation-charging> <label-charging>
format-charging-prefix = " "
format-charging-prefix-foreground = ${colors.nord14}
label-charging = %percentage%%
label-charging-foreground = ${colors.nord4}

; Discharging format
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%
label-discharging-foreground = ${colors.nord4}

; Full battery format
format-full = <label-full>
label-full = " Full"
label-full-foreground = ${colors.nord14}

; Low battery format - with animation frames defined
format-low = <animation-low> <label-low>
label-low = "⚠️ %percentage%%"
label-low-foreground = ${colors.nord11}

; LOW BATTERY ANIMATION FRAMES
animation-low-0 = ""
animation-low-0-foreground = ${colors.nord11}
animation-low-1 = ""
animation-low-1-foreground = ${colors.nord11}
animation-low-2 = ""
animation-low-2-foreground = ${colors.nord11}
animation-low-3 = ""
animation-low-3-foreground = ${colors.nord11}
animation-low-4 = ""
animation-low-4-foreground = ${colors.nord11}
animation-low-framerate = 500

; Capacity ramp icons (for normal discharging)
ramp-capacity-0 = ""
ramp-capacity-0-foreground = ${colors.nord11}
ramp-capacity-1 = ""
ramp-capacity-1-foreground = ${colors.nord12}
ramp-capacity-2 = ""
ramp-capacity-2-foreground = ${colors.nord13}
ramp-capacity-3 = ""
ramp-capacity-3-foreground = ${colors.nord14}
ramp-capacity-4 = ""
ramp-capacity-4-foreground = ${colors.nord14}

; Charging animation
animation-charging-0 = ""
animation-charging-0-foreground = ${colors.nord14}
animation-charging-1 = ""
animation-charging-1-foreground = ${colors.nord14}
animation-charging-2 = ""
animation-charging-2-foreground = ${colors.nord14}
animation-charging-3 = ""
animation-charging-3-foreground = ${colors.nord14}
animation-charging-4 = ""
animation-charging-4-foreground = ${colors.nord14}
animation-charging-framerate = 500

;==========================================================
; CPU Module
;==========================================================
[module/cpu]
type = internal/cpu
interval = 1

; Format with icon and percentage
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.nord8}
format-prefix-padding = 0
label = %percentage:2%%
label-foreground = ${colors.nord4}
label-padding = 0

;==========================================================
; Memory Module
;==========================================================
[module/memory]
type = internal/memory
interval = 2

; Format with icon and percentage
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.nord14}
format-prefix-padding = 0
label = %percentage_used%%
label-foreground = ${colors.nord4}
label-padding = 0

;==========================================================
; Volume Module
;==========================================================
[module/volume]
type = internal/pulseaudio
; master-mixer = Master

; Volume format
format-volume = <label-volume>
label-volume = "  %percentage%%"
label-volume-foreground = ${colors.nord8}
label-volume-padding = 0
use-ui-max = true

; Muted format
format-muted = <label-muted>
label-muted = " muted"
label-muted-foreground = ${colors.nord11}
label-muted-padding = 0

;==========================================================
; Tray Module
;==========================================================
[module/tray]
type = internal/tray
tray-spacing = 4px
tray-size = 60%
format-margin = 0px

;==========================================================
; Date and Time Module
;==========================================================
[module/date]
type = internal/date
interval = 1

; Default format 
date = %I:%M %p
date-alt = %A, %d %B %Y

; Label
format = <label>
label = %date%
label-alt = %date-alt%

